name: docker

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ${{ vars.DOCKER_REGISTRY || 'docker.io' }}
      IMAGE_NAME: ${{ vars.DOCKER_IMAGE_NAME || github.repository }}
      IMAGE_TAG_SHA: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY == 'docker.io' && env.IMAGE_NAME || format('{0}/{1}', env.REGISTRY, env.IMAGE_NAME) }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ env.IMAGE_TAG_SHA }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
